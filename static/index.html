<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kilo Free Models</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --paper: #f8f6f0;
            --text: #1a1a1a;
            --light: #888888;
            --line: #e0ddd4;
            --accent: #111111;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: var(--paper);
            color: var(--text);
            min-height: 100vh;
            padding: 60px 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 60px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 30px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: normal;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--light);
            font-size: 1rem;
        }

        .count {
            color: var(--accent);
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 80px;
            color: var(--light);
            font-size: 1.1rem;
        }

        .error {
            padding: 20px;
            border: 1px solid #e00;
            color: #c00;
            text-align: center;
            margin: 40px 0;
        }

        .models-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .model-item {
            padding: 24px 0;
            border-bottom: 1px solid var(--line);
            transition: opacity 0.15s;
        }

        .model-item:hover {
            opacity: 0.7;
        }

        .model-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 6px;
        }

        .model-name {
            font-size: 1.3rem;
            font-weight: normal;
        }

        .model-id {
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--light);
            margin-bottom: 12px;
        }

        .model-details {
            display: flex;
            gap: 18px;
            font-size: 0.9rem;
            color: var(--light);
            margin-bottom: 12px;
        }

        .model-params {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .param {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--light);
            padding: 2px 6px;
            border: 1px solid var(--line);
        }

        .free-badge {
            font-size: 0.75rem;
            color: var(--light);
            letter-spacing: 0.05em;
        }

        .no-models {
            text-align: center;
            padding: 80px;
            color: var(--light);
        }

        @media (max-width: 600px) {
            body {
                padding: 30px 15px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .model-details {
                flex-direction: column;
                gap: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Kilo Free Models</h1>
            <p class="subtitle">Liste de tous les modèles gratuits disponibles sur Kilo.ai <span class="count" id="count"></span></p>
        </header>

        <div id="loading" class="loading">Chargement...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="models" class="models-list"></div>
    </div>

    <script>
        async function loadFreeModels() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const modelsDiv = document.getElementById('models');
            const countBadge = document.getElementById('count');

            try {
                const response = await fetch('/api/models/free');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const data = await response.json();
                const models = data.data || [];

                loading.style.display = 'none';
                countBadge.textContent = `(${models.length})`;

                if (models.length === 0) {
                    modelsDiv.innerHTML = '<div class="no-models">Aucun modèle gratuit trouvé</div>';
                    return;
                }

                modelsDiv.innerHTML = models.map(model => `
                    <div class="model-item">
                        <div class="model-top">
                            <div class="model-name">${model.name || 'Modèle inconnu'}</div>
                            <span class="free-badge">Gratuit</span>
                        </div>
                        <div class="model-id">${model.id || ''}</div>

                        <div class="model-details">
                            ${model.context_length ? `<span>${formatContextLength(model.context_length)} tokens</span>` : ''}
                            ${model.architecture ? `
                                <span>IN: ${model.architecture.input_modalities?.join(', ') || '-'}</span>
                                <span>OUT: ${model.architecture.output_modalities?.join(', ') || '-'}</span>
                            ` : ''}
                        </div>

                        ${model.supported_parameters && model.supported_parameters.length > 0 ? `
                            <div class="model-params">
                                ${model.supported_parameters.map(p => `<span class="param">${p}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                `).join('');

            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = 'Erreur: ' + err.message;
            }
        }

        function formatContextLength(length) {
            if (!length) return '';
            if (length >= 1000000) return (length / 1000000).toFixed(length % 1000000 === 0 ? 0 : 1) + 'M';
            if (length >= 1000) return (length / 1000).toFixed(0) + 'K';
            return length;
        }

        loadFreeModels();
    </script>
</body>
</html>
